name: myfirstpipeline
on: 
  push: 
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions: 
  id-token: write
  contents: read

jobs:
  terraform-init-plan:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2
        
      - name: Azure Login
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          tenant-id: ${{ secrets.TENANT_ID }}
          subscription-id: ${{ secrets.SUBSCRIPTION_ID }}
        
        

      - name: terraform fmt
        id: fmt
        run: terraform fmt
        working-directory: environment/dev

      - name: terraform-init
        id: init
        run: terraform init
        working-directory: environment/dev

      - name: terraform-validate
        id: validate
        run: terraform validate
        working-directory: environment/dev

      - name: terraform-plan
        id: plan
        run: terraform plan
        working-directory: environment/dev


  terraform-apply:
    runs-on: self-hosted
    steps:
      - name: checkout
        uses: actions/checkout@v6.0.2

      - name: terraform-init
        id: init
        run: terraform init
        working-directory: environment/dev
  
      - name: terraform-apply
        id: apply
        run: terraform apply --auto-approve
        working-directory: environment/dev

       
        
  
